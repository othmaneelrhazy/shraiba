<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>شرايبة | تفاصيل المنتج</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* شريط الشحن */
    .shipping-bar {
      background: var(--brown-dark); color: var(--beige);
      text-align: center; font-size: 0.85rem; font-weight: 700;
      padding: 0.6rem 1rem; letter-spacing: 0.02em;
    }

    /* منتجات مقترحة */
    .related { background: var(--beige); padding: 2.5rem 0 3rem; margin-top: 2rem; }
    .related__title {
      font-size: 1.4rem; font-weight: 900; margin-bottom: 1.5rem;
      color: var(--brown-dark);
    }
    .product-page { padding: 1.5rem 0 3rem; }

    .back-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      color: var(--brown); font-weight: 600; font-size: 0.9rem;
      margin-bottom: 1.5rem; transition: color 0.2s;
    }
    .back-btn:hover { color: var(--terracotta); }

    .product-layout {
      display: flex; flex-direction: column; gap: 2rem;
    }

    /* السحب يميناً ويساراً */
    .gallery__main {
      position: relative; border-radius: var(--radius);
      overflow: hidden; box-shadow: var(--shadow);
      background: var(--beige);
      touch-action: pan-y;
    }
    .gallery__slider {
      display: flex; transition: transform 0.35s ease;
      will-change: transform;
    }
    .gallery__slider img {
      width: 100%; flex-shrink: 0;
      aspect-ratio: 1; object-fit: cover; display: block;
    }
    .gallery__arrows {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 100%; display: flex; justify-content: space-between;
      padding: 0 0.5rem; pointer-events: none;
    }
    .gallery__arrow {
      pointer-events: all; background: rgba(255,255,255,0.85);
      border: none; border-radius: 50%; width: 36px; height: 36px;
      font-size: 1.1rem; cursor: pointer; box-shadow: var(--shadow);
      display: grid; place-items: center;
    }
    .gallery__thumbs {
      display: flex; gap: 0.6rem; margin-top: 0.8rem;
      overflow-x: auto; padding-bottom: 0.3rem;
    }
    .gallery__thumbs img {
      width: 72px; height: 72px; object-fit: cover;
      border-radius: 8px; cursor: pointer; border: 2px solid transparent;
      transition: border-color 0.2s; flex-shrink: 0;
    }
    .gallery__thumbs img.active { border-color: var(--terracotta); }

    /* تفاصيل المنتج */
    .product-info__badge {
      display: inline-block; background: var(--terracotta); color: var(--white);
      font-size: 0.75rem; font-weight: 700; padding: 0.2rem 0.8rem;
      border-radius: 999px; margin-bottom: 0.8rem;
    }
    .product-info__name {
      font-size: 1.5rem; font-weight: 900; line-height: 1.3;
      color: var(--brown-dark); margin-bottom: 0.8rem;
    }
    .product-info__meta {
      display: flex; align-items: center; gap: 1rem;
      font-size: 0.85rem; margin-bottom: 1rem;
      color: var(--brown);
    }
    .product-info__meta .stars { color: #e0a426; font-weight: 700; }
    .product-info__stock {
      background: #fff3cd; border: 1px solid #ffc107;
      border-radius: 10px; padding: 0.6rem 1rem;
      font-size: 0.85rem; font-weight: 700; color: #856404;
      margin-bottom: 1rem;
    }
    .product-info__stock--available {
      background: #f0faf4; border: 1px solid #c3e6cb;
      border-radius: 10px; padding: 0.6rem 1rem;
      font-size: 0.85rem; font-weight: 700; color: #2d6a4f;
      margin-bottom: 1rem;
    }
    .product-info__pricing {
      display: flex; align-items: baseline; gap: 0.8rem;
      margin-bottom: 1.2rem;
    }
    .product-info__price {
      font-size: 2rem; font-weight: 900; color: var(--terracotta);
    }
    .product-info__old {
      font-size: 1rem; color: #9c8771; text-decoration: line-through;
    }
    .product-info__shipping {
      background: #f0faf4; border: 1px solid #c3e6cb;
      border-radius: 10px; padding: 0.7rem 1rem;
      font-size: 0.85rem; color: #2d6a4f;
      margin-bottom: 1.2rem; display: flex; align-items: center; gap: 0.5rem;
    }
    .product-info__desc {
      font-size: 0.9rem; color: var(--brown);
      line-height: 1.9; margin-bottom: 1.5rem;
      white-space: pre-line;
    }

    /* Quantity selector */
    .qty-wrapper {
      display: flex; align-items: center; gap: 0; margin-bottom: 1rem;
    }
    .qty-label {
      font-size: 0.9rem; font-weight: 700; color: var(--brown-dark);
      margin-left: 0.8rem;
    }
    .qty-box {
      display: flex; align-items: center; border: 2px solid var(--brown);
      border-radius: 10px; overflow: hidden;
    }
    .qty-btn {
      background: var(--beige); border: none; cursor: pointer;
      font-size: 1.3rem; font-weight: 900; color: var(--brown-dark);
      width: 40px; height: 40px; display: grid; place-items: center;
      transition: background 0.15s;
    }
    .qty-btn:hover { background: #e8ddd0; }
    .qty-num {
      min-width: 44px; text-align: center; font-size: 1.1rem;
      font-weight: 900; color: var(--brown-dark);
    }
    .qty-total {
      font-size: 0.85rem; color: var(--brown); margin-top: 0.3rem;
      margin-bottom: 1rem;
    }

    .product-info__wa {
      display: block; background: var(--green); color: var(--white);
      text-align: center; font-weight: 900; font-size: 1.1rem;
      padding: 0.9rem; border-radius: 12px;
      box-shadow: 0 4px 15px rgba(37,211,102,0.35);
      transition: filter 0.2s; margin-bottom: 0.8rem;
      cursor: pointer; border: none; width: 100%;
      text-decoration: none;
    }
    .product-info__wa:hover { filter: brightness(0.92); color: var(--white); }
    .product-info__note {
      text-align: center; font-size: 0.8rem; color: var(--brown); opacity: 0.8;
    }
    /* Weight selector for clay product */
    .weight-selector { margin-bottom: 1.2rem; }
    .weight-selector__label {
      font-size: 0.9rem; font-weight: 700; color: var(--brown-dark);
      margin-bottom: 0.7rem; display: block;
    }
    .weight-options {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.6rem;
    }
    .weight-btn {
      border: 2px solid #d4c4b0; border-radius: 12px;
      background: var(--white); cursor: pointer; padding: 0.7rem 0.5rem;
      text-align: center; transition: all 0.2s; font-family: inherit;
    }
    .weight-btn:hover { border-color: var(--terracotta); }
    .weight-btn.active {
      border-color: var(--terracotta); background: #fff5f0;
    }
    .weight-btn__size {
      display: block; font-size: 0.95rem; font-weight: 900;
      color: var(--brown-dark);
    }
    .weight-btn__price {
      display: block; font-size: 1rem; font-weight: 900;
      color: var(--terracotta); margin-top: 0.2rem;
    }
    .product-info__cleaning {
      background: #fff5f5; border: 2px solid #e74c3c;
      border-radius: 12px; padding: 1rem 1.1rem;
      margin-bottom: 1.2rem; color: #c0392b;
      font-size: 0.88rem; line-height: 1.8;
    }
    .product-info__cleaning strong {
      display: block; font-size: 0.95rem; font-weight: 900;
      margin-bottom: 0.5rem; color: #c0392b;
    }
    .product-info__cleaning .cleaning-tip {
      color: #2d6a4f; font-weight: 700; margin-top: 0.5rem; display: block;
    }

    /* Desktop */
    @media (min-width: 768px) {
      .product-layout { flex-direction: row; align-items: flex-start; }
      .gallery { flex: 1; }
      .product-info { flex: 1; position: sticky; top: 80px; }
      .product-info__name { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">🏺 <span>شرايبة</span></a>
      <nav class="nav">
        <a href="index.html#products">المنتجات</a>
        <a href="index.html#highlights">لماذا نحن</a>
        <a href="index.html#contact" class="nav__cta">اطلب الآن</a>
      </nav>
    </div>
  </header>

  <!-- شريط الشحن -->
  <div class="shipping-bar">
    🚚👈 تكلفة الشحن مشمولة في سعر المنتج
  </div>

  <main class="product-page">
    <div class="container">
      <a href="index.html" class="back-btn">← العودة للمنتجات</a>

      <div class="product-layout" id="productLayout">
        <div style="text-align:center;padding:3rem;color:var(--brown);">جاري التحميل...</div>
      </div>
    </div>
  </main>

  <!-- منتجات مقترحة -->
  <section class="related">
    <div class="container">
      <h2 class="related__title">منتجات أخرى قد تعجبك</h2>
      <div class="products__grid" id="relatedGrid"></div>
    </div>
  </section>

  <!-- Floating WhatsApp -->
  <a href="https://wa.me/212688812627" class="wa-float" target="_blank" rel="noopener" aria-label="اطلب عبر واتساب">💬</a>

  <script src="script.js"></script>
  <script>
    let currentIndex = 0;
    let imgs = [];
    let startX = 0;
    let currentProduct = null;
    let currentQty = 1;

    function updateQty(delta) {
      currentQty = Math.max(1, currentQty + delta);
      const numEl = document.getElementById("qtyNum");
      const totalEl = document.getElementById("qtyTotal");
      const waBtn = document.getElementById("waBtn");
      if (numEl) numEl.textContent = currentQty;
      if (totalEl) totalEl.textContent = `الإجمالي: ${currentQty * currentProduct.price} درهم`;
      if (waBtn) {
        const q = currentQty;
        const total = q * currentProduct.price;
        const msg = q > 1
          ? `مرحبًا 👋 أريد طلب: ${currentProduct.name}\nالكمية: ${q} قطع\nالسعر الإجمالي: ${total} درهم 🏺`
          : `مرحبًا 👋 أريد طلب: ${currentProduct.name} بسعر ${currentProduct.price} درهم 🏺`;
        waBtn.href = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
      }
    }

    // Weight options for clay product
    const weightOptions = [
      { label: "نص كيلو", price: 65, oldPrice: 90 },
      { label: "1 كيلو",  price: 100, oldPrice: 160 },
      { label: "2 كيلو",  price: 150, oldPrice: 220 },
      { label: "3 كيلو",  price: 200, oldPrice: 280 },
    ];
    let selectedWeight = weightOptions[0];

    function selectWeight(idx) {
      selectedWeight = weightOptions[idx];
      // Update active button
      document.querySelectorAll(".weight-btn").forEach((btn, i) => {
        btn.classList.toggle("active", i === idx);
      });
      // Update price display
      const priceEl = document.getElementById("clayPrice");
      const oldEl   = document.getElementById("clayOldPrice");
      if (priceEl) priceEl.textContent = selectedWeight.price + " درهم";
      if (oldEl)   oldEl.textContent   = selectedWeight.oldPrice + " درهم";
      // Update whatsapp link
      const waBtn = document.getElementById("waBtn");
      if (waBtn) {
        const msg = `مرحبًا 👋 أريد طلب: الطين الأحمر الطبيعي\nالوزن: ${selectedWeight.label}\nالسعر: ${selectedWeight.price} درهم 🏺`;
        waBtn.href = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
      }
    }

    function loadProduct() {
      const params = new URLSearchParams(window.location.search);
      const id = parseInt(params.get("id"));
      const product = products.find(p => p.id === id);
      currentProduct = product;
      currentQty = 1;

      if (!product) {
        document.getElementById("productLayout").innerHTML =
          '<p style="text-align:center;padding:3rem;">المنتج غير موجود</p>';
        return;
      }

      document.title = `شرايبة | ${product.name}`;

      imgs = product.images || [product.img];
      currentIndex = 0;

      const initMsg = product.id === 3
        ? `مرحبًا 👋 أريد طلب: الطين الأحمر الطبيعي\nالوزن: نص كيلو\nالسعر: 65 درهم 🏺`
        : `مرحبًا 👋 أريد طلب: ${product.name} بسعر ${product.price} درهم 🏺`;
      const initUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(initMsg)}`;

      // Stock display
      let stockHtml = "";
      if (product.stock) {
        stockHtml = `<div class="product-info__stock">⚠️ باقي ${product.stock} قطع فقط في المخزون</div>`;
      } else if (product.stock === null) {
        stockHtml = `<div class="product-info__stock--available">✅ متوفر في المخزون</div>`;
      }

      // Weight selector for clay product (id 3)
      const weightHtml = product.id === 3 ? `
        <div class="weight-selector">
          <span class="weight-selector__label">اختر الوزن:</span>
          <div class="weight-options">
            ${weightOptions.map((w, i) => `
              <button class="weight-btn ${i===0?'active':''}" onclick="selectWeight(${i})">
                <span class="weight-btn__size">${w.label}</span>
                <span class="weight-btn__price">${w.price} درهم</span>
              </button>
            `).join('')}
          </div>
        </div>
      ` : "";

      // Quantity selector — only for hasQuantity products
      const qtyHtml = product.hasQuantity ? `
        <div class="qty-wrapper">
          <span class="qty-label">الكمية:</span>
          <div class="qty-box">
            <button class="qty-btn" onclick="updateQty(-1)">−</button>
            <span class="qty-num" id="qtyNum">1</span>
            <button class="qty-btn" onclick="updateQty(1)">+</button>
          </div>
        </div>
        <p class="qty-total" id="qtyTotal">الإجمالي: ${product.price} درهم</p>
      ` : "";

      document.getElementById("productLayout").innerHTML = `
        <div class="gallery">
          <div class="gallery__main" id="galleryMain">
            <div class="gallery__slider" id="gallerySlider">
              ${imgs.map((src, i) => `<img src="${src}" alt="صورة ${i+1}" />`).join("")}
            </div>
            ${imgs.length > 1 ? `
            <div class="gallery__arrows">
              <button class="gallery__arrow" onclick="prevImg()">‹</button>
              <button class="gallery__arrow" onclick="nextImg()">›</button>
            </div>` : ""}
          </div>
          ${imgs.length > 1 ? `
          <div class="gallery__thumbs">
            ${imgs.map((src, i) => `
              <img src="${src}" alt="صورة ${i+1}" class="${i===0?'active':''}"
                onclick="goToImg(${i})" />
            `).join("")}
          </div>` : ""}
        </div>

        <div class="product-info">
          ${product.badge ? `<span class="product-info__badge">${product.badge}</span>` : ""}
          <h1 class="product-info__name">${product.name}</h1>
          <div class="product-info__meta">
            <span class="stars">★ ${product.rating}</span>
            <span>| تم بيع +${product.sold} قطعة</span>
          </div>
          ${stockHtml}
          <div class="product-info__pricing">
            <span class="product-info__price" id="${product.id===3?'clayPrice':''}">${product.price} درهم</span>
            <span class="product-info__old" id="${product.id===3?'clayOldPrice':''}">${product.oldPrice} درهم</span>
          </div>
          <div class="product-info__shipping">
            🚚 التوصيل مجاني لجميع مدن المغرب
          </div>
          <p class="product-info__desc">${product.fullDesc || product.desc}</p>
          ${weightHtml}
          ${qtyHtml}
          ${product.hasQuantity ? `
          <div class="product-info__cleaning">
            <strong>⚠️ تنبيه: طريقة تنظيف القنينة الفخارية</strong>
            يُمنع استخدام المنظفات الكيميائية أو الصابون لغسل القنينة الفخارية، لأنها تمتص المواد الكيميائية وتؤثر على جودة الماء.
            <span class="cleaning-tip">✅ الطريقة الصحيحة: اغسل القنينة بالماء والملح — الملح يقتل البكتيريا بشكل طبيعي ويجعل القنينة نظيفة وصالحة للاستخدام كما كانت.</span>
          </div>` : ""}
          <a href="${initUrl}" id="waBtn" class="product-info__wa" target="_blank" rel="noopener">
            💬 اطلب الآن عبر واتساب
          </a>
          <p class="product-info__note">📦 الدفع عند الاستلام</p>
        </div>
      `;

      loadRelated(id);
      const main = document.getElementById("galleryMain");
      main.addEventListener("touchstart", e => { startX = e.touches[0].clientX; }, { passive: true });
      main.addEventListener("touchend", e => {
        const diff = startX - e.changedTouches[0].clientX;
        if (Math.abs(diff) > 40) diff > 0 ? nextImg() : prevImg();
      });
    }

    function updateSlider() {
      const slider = document.getElementById("gallerySlider");
      if (slider) slider.style.transform = `translateX(${currentIndex * 100}%)`;
      document.querySelectorAll(".gallery__thumbs img").forEach((el, i) => {
        el.classList.toggle("active", i === currentIndex);
      });
    }

    function nextImg() {
      currentIndex = (currentIndex + 1) % imgs.length;
      updateSlider();
    }

    function prevImg() {
      currentIndex = (currentIndex - 1 + imgs.length) % imgs.length;
      updateSlider();
    }

    function goToImg(i) {
      currentIndex = i;
      updateSlider();
    }

    function loadRelated(currentId) {
      const related = products.filter(p => !p.hidden && p.id !== currentId);
      const grid = document.getElementById("relatedGrid");
      if (!grid || related.length === 0) return;
      grid.innerHTML = related.map(p => `
        <article class="card visible">
          <a href="product.html?id=${p.id}" style="display:contents">
            <div class="card__media">
              <img src="${p.img}" alt="${p.name}" loading="lazy" />
              ${p.badge ? `<span class="card__badge">${p.badge}</span>` : ""}
            </div>
          </a>
          <div class="card__body">
            <h3 class="card__name">${p.name}</h3>
            <div class="card__pricing">
              <span class="card__price">${p.price} درهم</span>
              <span class="card__old">${p.oldPrice} درهم</span>
            </div>
            <a class="card__details" href="product.html?id=${p.id}">🔍 تفاصيل المنتج</a>
            <a class="card__wa" href="https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(`مرحبًا 👋 أريد طلب: ${p.name} بسعر ${p.price} درهم 🏺`)}" target="_blank" rel="noopener">اطلب عبر واتساب 💬</a>
          </div>
        </article>
      `).join("");
    }

    document.addEventListener("DOMContentLoaded", () => {
      loadProduct();
    });
  </script>
</body>
</html>
